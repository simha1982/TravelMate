name: Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore mobile project
        run: dotnet restore src/TravelMate.Mobile/TravelMate.Mobile.csproj

      - name: Build APK
        shell: pwsh
        run: ./scripts/build-apk.ps1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TravelMate.Mobile-release-apk
          path: artifacts/TravelMate.Mobile-release.apk
          if-no-files-found: error
          retention-days: 14

  build-signed-apk:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install Android workload
        run: dotnet workload install android

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path signing | Out-Null
          [IO.File]::WriteAllBytes("signing/travelmate-release.keystore", [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))

      - name: Build signed APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: pwsh
        run: >
          ./scripts/build-apk.ps1
          -OutputName TravelMate.Mobile-signed-release.apk
          -KeystorePath signing/travelmate-release.keystore
          -KeystorePassword "$env:ANDROID_KEYSTORE_PASSWORD"
          -KeyAlias "$env:ANDROID_KEY_ALIAS"
          -KeyPassword "$env:ANDROID_KEY_PASSWORD"

      - name: Upload signed APK artifact
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: TravelMate.Mobile-signed-release-apk
          path: artifacts/TravelMate.Mobile-signed-release.apk
          if-no-files-found: error
          retention-days: 30
