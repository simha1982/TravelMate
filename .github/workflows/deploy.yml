name: Deploy TravelMate

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: Azure environment name
        required: true
        default: dev
      resourceGroup:
        description: Azure resource group name
        required: true
      location:
        description: Azure region
        required: true
        default: eastus

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environmentName }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name "${{ inputs.resourceGroup }}" \
              --location "${{ inputs.location }}"
            az deployment group create \
              --resource-group "${{ inputs.resourceGroup }}" \
              --template-file infra/main.bicep \
              --parameters \
                location="${{ inputs.location }}" \
                environmentName="${{ inputs.environmentName }}" \
                sqlAdministratorLogin="${{ secrets.SQL_ADMIN_LOGIN }}" \
                sqlAdministratorPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
                useKeyVaultReferences=true

      - name: Build and test
        run: |
          dotnet restore TravelMate.sln
          dotnet test TravelMate.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish src/TravelMate.Api/TravelMate.Api.csproj --configuration Release --output ./publish/api

      - name: Publish Admin
        run: dotnet publish src/TravelMate.Admin/TravelMate.Admin.csproj --configuration Release --output ./publish/admin

      - name: Deploy API app
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.TRAVELMATE_API_APP_NAME }}
          package: ./publish/api

      - name: Deploy Admin app
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.TRAVELMATE_ADMIN_APP_NAME }}
          package: ./publish/admin
