name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: |
          dotnet restore src/TravelMate.Api/TravelMate.Api.csproj
          dotnet restore tests/TravelMate.Tests/TravelMate.Tests.csproj

      - name: Build
        run: dotnet build src/TravelMate.Api/TravelMate.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/TravelMate.Tests/TravelMate.Tests.csproj --configuration Release
